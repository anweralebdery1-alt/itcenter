{% extends 'store/base.html' %}
{% load store_extras %}
{% block title %}الدفع الإلكتروني | {{ settings.site_name }}{% endblock %}
{% block content %}
<main class="container-wide">
  <div class="panel p-5 mt-4">
    <h2 class="fw-bold">تم استلام طلبك</h2>
    <p class="text-muted">
      تم إنشاء الطلب رقم #{{ order.id }} بقيمة {{ order.total|money }} د.ع، وسنتواصل معك لتأكيد الدفع والتوصيل.
    </p>
    <a class="btn btn-blue px-5" href="{% url 'order_success' order.id %}">متابعة</a>
  </div>
</main>
{% endblock %}
